name: Feature Request
description: Suggest an improvement for CharBrowser
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe your proposed behavior/UI.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternatives you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, examples, or related references.
